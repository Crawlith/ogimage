name: Template Security & Perf Scan

on:
  pull_request:
    paths:
      - 'templates/**'

jobs:
  scan:
    name: AST & Runtime Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - run: pnpm install

      - name: AST Security Scan
        run: pnpm template:scan

      - name: Render Benchmarks & Size Check
        run: pnpm template:test

      - name: Generate Visual Previews
        run: pnpm template:preview

      - name: Upload Visual Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: template-previews
          path: templates/**/preview.png
          retention-days: 7
