name: Quality Checks (PR)

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.changeset/**'

jobs:
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - run: pnpm install
      
      - name: Typecheck
        run: pnpm typecheck
        
      - name: Lint
        run: pnpm lint
        if: success()

      - name: Test
        run: pnpm test
        if: success()

      - name: Build
        run: pnpm build
        if: success()
