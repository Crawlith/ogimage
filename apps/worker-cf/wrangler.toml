name = "og-engine"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_ID"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "og-engine-images"

[vars]
PUBLIC_BASE_URL = "https://your-r2-public-url.com"

[observability]
enabled = true

[dev]
port = 8787
